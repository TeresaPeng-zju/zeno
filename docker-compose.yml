services:
  db:
    image: pgvector/pgvector:pg16
    container_name: zeno-postgres
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-zeno}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-zeno}
      POSTGRES_DB: ${POSTGRES_DB:-zeno}
    ports:
      - "5432:5432"
    volumes:
      - zeno_pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U zeno -d zeno"]
      interval: 5s
      timeout: 5s
      retries: 10

volumes:
  zeno_pgdata:
