services:
  db:
    image: pgvector/pgvector:pg16
    container_name: zeno-postgres
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-zeno}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB:-zeno}
    volumes:
      - zeno_pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U zeno -d zeno"]
      interval: 5s
      timeout: 5s
      retries: 10
    restart: unless-stopped

  api:
    build: ./apps/api
    container_name: zeno-api
    depends_on:
      db:
        condition: service_healthy
    environment:
      DATABASE_URL: postgresql+psycopg://${POSTGRES_USER:-zeno}:${POSTGRES_PASSWORD}@db:5432/${POSTGRES_DB:-zeno}
      CORS_ORIGINS: ${CORS_ORIGINS:-http://localhost:3000}
      LLM_PROVIDER: ${LLM_PROVIDER:-mock}
      OPENAI_API_KEY: ${OPENAI_API_KEY:-}
      EMBEDDING_PROVIDER: ${EMBEDDING_PROVIDER:-mock}
      SKILL_GRAPH_PATH: app/data/skill_graph.json
      PATH_CONFIG_PATH: app/data/path_config.json
    ports:
      - "8000:8000"
    restart: unless-stopped

  web:
    build: ./apps/web
    container_name: zeno-web
    depends_on:
      - api
    environment:
      NEXT_PUBLIC_API_BASE: ${NEXT_PUBLIC_API_BASE:-http://api:8000}
    ports:
      - "3000:3000"
    restart: unless-stopped

  nginx:
    image: nginx:alpine
    container_name: zeno-nginx
    depends_on:
      - web
      - api
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./deploy/nginx.conf:/etc/nginx/conf.d/default.conf
      - ./deploy/certs:/etc/nginx/certs
    restart: unless-stopped

volumes:
  zeno_pgdata:
